<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>クラゲライダー・カニィとプカプカの大冒険</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Main game canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Virtual gamepad overlay (populated by VirtualPad class) -->
  <div id="virtual-pad"></div>

  <!-- ======================================================
       Engine layer (order matters: physics before entities)
  ====================================================== -->
  <script src="js/engine/loop.js"></script>
  <script src="js/engine/input.js"></script>
  <script src="js/engine/physics.js"></script>
  <script src="js/engine/camera.js"></script>

  <!-- ======================================================
       Sprite data
  ====================================================== -->
  <script src="js/sprites/player_sprites.js"></script>
  <script src="js/sprites/enemy_sprites.js"></script>
  <script src="js/sprites/tile_sprites.js"></script>
  <script src="js/sprites/renderer.js"></script>

  <!-- ======================================================
       Stage / world data
  ====================================================== -->
  <script src="js/data/stages.js"></script>

  <!-- ======================================================
       Game logic (depends on engine + sprites + data)
  ====================================================== -->
  <script src="js/game/projectile.js"></script>
  <script src="js/game/hazard.js"></script>
  <script src="js/game/enemy.js"></script>
  <script src="js/game/boss.js"></script>
  <script src="js/game/player.js"></script>

  <!-- ======================================================
       UI layer (depends on game logic + engine)
  ====================================================== -->
  <script src="js/ui/virtualpad.js"></script>
  <script src="js/ui/hud.js"></script>
  <script src="js/ui/screens.js"></script>

  <!-- ======================================================
       Main entry point (wires everything together)
  ====================================================== -->
  <script src="js/main.js"></script>

</body>
</html>
